# This is a GoReleaser configuration file.
# See https://goreleaser.com for full documentation.

version: 2 # Using the v2 schema for 2026 compatibility

project_name: pixe

before:
  hooks:
    # It's good practice to ensure dependencies are tidy before building
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0 # Static binaries are usually preferred for sysadmin tools
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # Injects the version, commit, and date into your main package
    ldflags:
      - -s -w -X github.com/cwlls/pixe-go/internal/version.Version={{.Version}} -X github.com/cwlls/pixe-go/internal/version.Commit={{.Commit}} -X github.com/cwlls/pixe-go/internal/version.BuildDate={{.Date}}
    # Point this to your main.go location (often "." or "./cmd/myapp")
    main: .

archives:
  - format: tar.gz
    # Use zip for windows specifically
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  # You can add a custom header or footer to the release notes
  header: |
    ## Release {{.Tag}}
  footer: |
    *Built with Go 1.25*
