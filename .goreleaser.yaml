# This is a GoReleaser configuration file.
# See https://goreleaser.com for full documentation.

version: 2 # Using the v2 schema for 2026 compatibility

project_name: pixe

before:
  hooks:
    # It's good practice to ensure dependencies are tidy before building
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0 # Static binaries are usually preferred for sysadmin tools
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # Injects version, commit, and build date into the cmd package vars.
    # All three targets are package-level vars (not consts), so -X works correctly.
    ldflags:
      - >-
        -s -w
        -X github.com/cwlls/pixe-go/cmd.version={{.Version}}
        -X github.com/cwlls/pixe-go/cmd.commit={{.Commit}}
        -X github.com/cwlls/pixe-go/cmd.buildDate={{.Date}}
    # Point this to your main.go location (often "." or "./cmd/myapp")
    main: .

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  # You can add a custom header or footer to the release notes
  header: |
    ## Release {{.Tag}}
  footer: |
    *Built with Go 1.25*
