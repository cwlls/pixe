run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: true
  # Ensures we are targeting the Go 1.25 features
  go: '1.25'

linters:
  disable-all: true
  enable:
    - errcheck
    - goconst
    - gocritic
    - gofmt
    - gosimple    # Now strictly validated in newer versions
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - typecheck
    - unused

linters-settings:
  revive:
    # Most 'revive' rules are now configured via a separate rules list
    ignore-generated-header: true
    severity: warning

  staticcheck:
    # staticcheck now requires a specified Go version to avoid parsing errors
    go: "1.25"

  govet:
    enable-all: true
    disable:
      - fieldalignment # Often too noisy for general sysadmin utilities

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
