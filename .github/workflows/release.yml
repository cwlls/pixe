name: Release
on:
  push:
    tags:
      - 'v*'

# THIS IS THE MISSING PIECE
permissions:
  contents: write  # Allows the action to create a release and upload assets
  packages: write  # Optional: only if you are also pushing to GitHub Container Registry

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true # Ensures GoReleaser doesn't have to re-download everything

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
